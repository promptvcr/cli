name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      # GoReleaser pushes the Homebrew formula to promptvcr/homebrew-tap over SSH
      # using a repo-scoped write deploy key (no PAT). Write it to a file and let
      # the .goreleaser.yaml reference it via HOMEBREW_TAP_KEY_FILE.
      - name: Write Homebrew tap deploy key
        env:
          TAP_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_KEY" > ~/.ssh/tap_ed25519
          chmod 600 ~/.ssh/tap_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_KEY_FILE: /home/runner/.ssh/tap_ed25519
