name: Smoke (live providers)

# Paid, opt-in end-to-end verification against real provider APIs through the
# TLS-MITM proxy: record a live streamed call, then replay it and assert the SSE
# frames are byte-identical. Deliberately kept OUT of the push/PR CI. It runs on a
# nightly schedule and on demand. Each provider is skipped unless its API-key
# secret is set, so this is $0 (and green) until you add OPENAI_API_KEY /
# ANTHROPIC_API_KEY repo secrets.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly

permissions:
  contents: read

concurrency:
  group: smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Live record/replay smoke test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: go test -tags smoke ./internal/proxy/ -run Smoke -v
